<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 BetBot Analytics — Mars 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f1923;color:#e1e8ed;min-height:100vh}
.header{background:linear-gradient(135deg,#1a2a3a 0%,#0d1b2a 100%);padding:20px;text-align:center;border-bottom:3px solid #00d4aa}
.header h1{font-size:1.8em;color:#00d4aa}
.header p{color:#8899aa;margin-top:5px;font-size:.9em}
.tabs{display:flex;gap:5px;padding:15px 20px;background:#1a2634;flex-wrap:wrap}
.tab{padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85em;border:none;background:#243447;color:#8899aa;transition:.2s}
.tab:hover{background:#2d4a5e;color:#fff}
.tab.active{background:#00d4aa;color:#0f1923}
.container{max-width:1200px;margin:0 auto;padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:25px}
.stat-card{background:#1a2634;border-radius:12px;padding:16px;text-align:center;border:1px solid #2d3f52}
.stat-card .label{font-size:.75em;color:#8899aa;text-transform:uppercase;letter-spacing:1px}
.stat-card .value{font-size:1.8em;font-weight:700;margin-top:5px}
.stat-card .sub{font-size:.75em;color:#667788;margin-top:3px}
.green{color:#00d4aa}.red{color:#ff6b6b}.orange{color:#ffa94d}.blue{color:#74c0fc}
.panel{display:none}.panel.active{display:block}
.section-title{font-size:1.1em;margin:20px 0 15px;padding-left:10px;border-left:4px solid #00d4aa;color:#fff}
.filters{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{background:#1a2634;color:#e1e8ed;border:1px solid #2d3f52;border-radius:8px;padding:8px 12px;font-size:.85em}
.filters select:focus{outline:none;border-color:#00d4aa}
.filters label{color:#8899aa;font-size:.8em}
table{width:100%;border-collapse:collapse;font-size:.8em}
th{background:#1a2634;color:#8899aa;padding:10px 6px;text-align:center;position:sticky;top:0;font-weight:600;text-transform:uppercase;font-size:.7em;letter-spacing:.5px}
td{padding:8px 6px;text-align:center;border-bottom:1px solid #1a2634}
tr:hover{background:#1a2634}
.badge{display:inline-block;padding:2px 8px;border-radius:16px;font-weight:700;font-size:.8em}
.badge-ok{background:#00d4aa22;color:#00d4aa;border:1px solid #00d4aa44}
.badge-ko{background:#ff6b6b22;color:#ff6b6b;border:1px solid #ff6b6b44}
.badge-pred{font-size:.7em;padding:2px 8px;border-radius:4px}
.badge-1{background:#3b82f633;color:#60a5fa}
.badge-X{background:#f59e0b33;color:#fbbf24}
.badge-2{background:#ef444433;color:#f87171}
.badge-sport{padding:3px 10px;border-radius:12px;font-size:.75em;font-weight:600}
.taux-cell{font-weight:700;border-radius:6px;padding:3px 6px}
.taux-high{background:#00d4aa22;color:#00d4aa}
.taux-mid{background:#ffa94d22;color:#ffa94d}
.taux-low{background:#ff6b6b22;color:#ff6b6b}
.chart-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;padding:6px 0}
.chart-label{width:100px;font-size:.85em;color:#8899aa;text-align:right}
.chart-bar-bg{flex:1;height:26px;background:#1a2634;border-radius:6px;overflow:hidden}
.chart-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:.8em;font-weight:600;transition:width .5s}
.chart-value{width:55px;font-size:.85em;font-weight:700;text-align:right}
.table-wrap{max-height:600px;overflow-y:auto;border-radius:12px;border:1px solid #2d3f52}
.table-wrap table{margin:0}
.sport-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;margin-bottom:25px}
.sport-card{background:#1a2634;border-radius:12px;padding:20px;border:1px solid #2d3f52}
.sport-card h3{font-size:1.1em;margin-bottom:12px;color:#fff}
.sport-card .big-num{font-size:2.5em;font-weight:700}
.sport-card .cats{margin-top:12px}
.sport-card .cat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #2d3f5233;font-size:.85em}
.sport-card .cat-row:last-child{border:none}
.no-score{color:#667788;font-style:italic;font-size:.8em}
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .header h1{font-size:1.3em}
  .tab{padding:8px 12px;font-size:.75em}
  td,th{padding:5px 3px;font-size:.7em}
}
</style>
</head>
<body>

<div class="header">
  <h1>⚽ BetBot Analytics</h1>
  <p>Multi-sport — Historique 01/03 au 26/03/2026 — 9 sports</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="show('overview')">📊 Vue d'ensemble</button>
  <button class="tab" onclick="show('football')">⚽ Football</button>
  <button class="tab" onclick="show('others')">🏀 Autres Sports</button>
  <button class="tab" onclick="show('details')">🔍 Matchs</button>
</div>

<div class="container">
<div id="panel-overview" class="panel active">
  <div class="stats-grid" id="ov-stats"></div>
  <div class="section-title">🏆 Performance par sport</div>
  <div class="sport-cards" id="ov-sports"></div>
</div>

<div id="panel-football" class="panel">
  <div class="section-title">📅 Taux réussite Football par jour et catégorie</div>
  <div class="filters">
    <label>Catégorie :</label>
    <select id="fb-cat" onchange="renderFBTable()"><option value="all">Toutes</option></select>
  </div>
  <div class="table-wrap"><table id="fb-table"></table></div>
  <div class="section-title" style="margin-top:30px">📊 Résumé par catégorie</div>
  <div id="fb-summary"></div>
</div>

<div id="panel-others" class="panel">
  <div class="filters">
    <label>Sport :</label>
    <select id="os-sport" onchange="renderOSTable()"><option value="all">Tous</option></select>
  </div>
  <div class="table-wrap"><table id="os-table"></table></div>
</div>

<div id="panel-details" class="panel">
  <div class="filters">
    <label>Sport :</label>
    <select id="dt-sport" onchange="renderDetails()"><option value="all">Tous</option><option value="Football">Football</option></select>
    <label>Catégorie :</label>
    <select id="dt-cat" onchange="renderDetails()"><option value="all">Toutes</option></select>
    <label>Date :</label>
    <select id="dt-date" onchange="renderDetails()"><option value="all">Toutes</option></select>
    <label>Résultat :</label>
    <select id="dt-result" onchange="renderDetails()"><option value="all">Tous</option><option value="ok">✅ Correct</option><option value="ko">❌ Incorrect</option></select>
  </div>
  <div style="color:#8899aa;font-size:.8em;margin-bottom:8px" id="dt-count"></div>
  <div class="table-wrap"><table id="dt-table"></table></div>
</div>
</div>

<script>
const S=__SPORTS__,DC=__DAILY_CAT__,OD=__OTHER_DAILY__,FD=__FOOTBALL_DETAILS__,OTD=__OTHER_DETAILS__,AD=__ALL_DATES__;

function tauxC(t){return t>=55?'taux-high':t>=45?'taux-mid':'taux-low'}
function tauxCol(t){return t>=55?'#00d4aa':t>=45?'#ffa94d':'#ff6b6b'}
function badge(ok){return ok?'<span class="badge badge-ok">✅</span>':'<span class="badge badge-ko">❌</span>'}
function predB(p){return p==='1'?'<span class="badge badge-pred badge-1">1</span>':p==='X'?'<span class="badge badge-pred badge-X">X</span>':p==='2'?'<span class="badge badge-pred badge-2">2</span>':'<span class="badge badge-pred">'+p+'</span>'}
function pct(n,t){return t?Math.round(n/t*100):0}
const sportColors={'Football':'#00d4aa','Tennis':'#fbbf24','Basketball':'#f97316','Hockey':'#60a5fa','Volleyball':'#a78bfa','Handball':'#f472b6','Cricket':'#34d399','Baseball':'#fb923c','Rugby':'#818cf8'};

function show(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  event.target.classList.add('active');
}

// Overview
function renderOverview(){
  const fb=S.find(s=>s.sport==='Football');
  const otherSports=S.filter(s=>s.sport!=='Football');
  const totalPreds=S.reduce((a,s)=>a+(s.total_scored||0)+(s.total_preds||0),0);
  const totalScored=S.reduce((a,s)=>a+s.total_scored,0);
  const totalOK=S.reduce((a,s)=>a+s.ok,0);

  document.getElementById('ov-stats').innerHTML=`
    <div class="stat-card"><div class="label">Sports</div><div class="value">${S.length}</div><div class="sub">Football + 8 autres</div></div>
    <div class="stat-card"><div class="label">Total matchs</div><div class="value">${totalPreds.toLocaleString()}</div><div class="sub">01-26/03/2026</div></div>
    <div class="stat-card"><div class="label">Avec score</div><div class="value">${totalScored.toLocaleString()}</div><div class="sub">Vérifiables</div></div>
    <div class="stat-card"><div class="label">Taux réussite</div><div class="value ${totalOK/totalScored>=.5?'green':'orange'}">${pct(totalOK,totalScored)}%</div><div class="sub">${totalOK}/${totalScored}</div></div>
  `;

  document.getElementById('ov-sports').innerHTML=S.map(s=>{
    const c=sportColors[s.sport]||'#00d4aa';
    const main=s.has_scores?`<div class="big-num" style="color:${c}">${s.taux}%</div><div class="sub">${s.ok}/${s.total_scored} corrects</div>`:`<div class="big-num" style="color:${c}">${s.total_preds}</div><div class="sub">pronostics (pas de score)</div>`;
    const catsHtml=Object.entries(s.categories).map(([k,v])=>{
      if(v.taux!==undefined) return `<div class="cat-row"><span>${k}</span><span style="color:${tauxCol(v.taux)};font-weight:700">${v.taux}% (${v.ok}/${v.total})</span></div>`;
      const preds=v.preds?Object.entries(v.preds).map(([p,n])=>`${p}: ${n}`).join(', '):'';
      return `<div class="cat-row"><span>${k}</span><span style="color:#8899aa">${v.total} matchs ${preds?'('+preds+')':''}</span></div>`;
    }).join('');
    return `<div class="sport-card"><h3 style="color:${c}">${s.sport==='Football'?'⚽':s.sport==='Tennis'?'🎾':s.sport==='Basketball'?'🏀':s.sport==='Hockey'?'🏒':s.sport==='Volleyball'?'🏐':s.sport==='Handball'?'🤾':s.sport==='Cricket'?'🏏':s.sport==='Baseball'?'⚾':'🏉'} ${s.sport}</h3>${main}<div class="cats">${catsHtml}</div></div>`;
  }).join('');
}

// Football table
function initFBFilters(){
  const cats=[...new Set(DC.map(d=>d.category))].sort();
  document.getElementById('fb-cat').innerHTML='<option value="all">Toutes</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}
function renderFBTable(){
  const cat=document.getElementById('fb-cat').value;
  let data=DC;
  if(cat!=='all') data=data.filter(d=>d.category===cat);
  // Pivot
  const dates=[...new Set(data.map(d=>d.date))].sort();
  const cats=[...new Set(data.map(d=>d.category))].sort();
  let html='<thead><tr><th>Date</th><th>Catégorie</th><th>Matchs</th><th>OK</th><th>Taux</th><th>Barre</th></tr></thead><tbody>';
  html+=data.map(d=>`<tr><td style="font-weight:600">${d.date.slice(5)}</td><td><span class="badge-sport" style="background:#00d4aa22;color:#00d4aa">${d.category}</span></td><td>${d.total}</td><td>${d.ok}</td><td><span class="taux-cell ${tauxC(d.taux)}">${d.taux}%</span></td><td><div style="background:#1a2634;height:8px;border-radius:4px;overflow:hidden;width:100px"><div style="width:${d.taux}%;height:100%;background:${tauxCol(d.taux)};border-radius:4px"></div></div></td></tr>`).join('');
  html+='</tbody>';
  document.getElementById('fb-table').innerHTML=html;

  // Summary
  const summary={};
  data.forEach(d=>{if(!summary[d.category])summary[d.category]={t:0,o:0};summary[d.category].t+=d.total;summary[d.category].o+=d.ok;});
  document.getElementById('fb-summary').innerHTML='<div style="display:flex;gap:15px;flex-wrap:wrap">'+Object.entries(summary).map(([k,v])=>`<div style="background:#1a2634;border-radius:10px;padding:15px;min-width:140px;text-align:center;border:1px solid #2d3f52"><div style="font-size:.75em;color:#8899aa">${k}</div><div style="font-size:1.5em;font-weight:700;color:${tauxCol(pct(v.o,v.t))}">${pct(v.o,v.t)}%</div><div style="font-size:.75em;color:#667788">${v.o}/${v.t}</div></div>`).join('')+'</div>';
}

// Other sports table
function initOSFilters(){
  const sports=[...new Set(OD.map(d=>d.sport))].sort();
  document.getElementById('os-sport').innerHTML='<option value="all">Tous</option>'+sports.map(s=>`<option value="${s}">${s}</option>`).join('');
}
function renderOSTable(){
  const sport=document.getElementById('os-sport').value;
  let data=OD;
  if(sport!=='all') data=data.filter(d=>d.sport===sport);
  const dates=[...new Set(data.map(d=>d.date))].sort();
  let html='<thead><tr><th>Date</th><th>Sport</th><th>Pronostics</th><th>Score dispo</th><th>OK</th><th>Taux</th></tr></thead><tbody>';
  html+=data.map(d=>{
    const c=sportColors[d.sport]||'#00d4aa';
    return `<tr><td style="font-weight:600">${d.date.slice(5)}</td><td><span class="badge-sport" style="background:${c}22;color:${c}">${d.sport}</span></td><td>${d.total_preds}</td><td>${d.total_scored||'-'}</td><td>${d.ok||'-'}</td><td>${d.total_scored?`<span class="taux-cell ${tauxC(d.taux)}">${d.taux}%</span>`:'<span class="no-score">N/A</span>'}</td></tr>`;
  }).join('');
  html+='</tbody>';
  document.getElementById('os-table').innerHTML=html;
}

// Details
function initDetailFilters(){
  const sports=['Football',...[...new Set(OTD.map(d=>d.sport))].sort()];
  document.getElementById('dt-sport').innerHTML='<option value="all">Tous</option>'+sports.map(s=>`<option value="${s}">${s}</option>`).join('');
  const cats=[...new Set(FD.map(d=>d.category))].sort();
  document.getElementById('dt-cat').innerHTML='<option value="all">Toutes</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  const dates=[...AD].sort().reverse();
  document.getElementById('dt-date').innerHTML='<option value="all">Toutes</option>'+dates.map(d=>`<option value="${d}">${d}</option>`).join('');
}
function renderDetails(){
  const sp=document.getElementById('dt-sport').value;
  const cat=document.getElementById('dt-cat').value;
  const dt=document.getElementById('dt-date').value;
  const res=document.getElementById('dt-result').value;
  let all=sp==='Football'||sp==='all'?FD:[];
  if(sp==='all'||sp!=='Football') all=[...all,...OTD.filter(d=>sp==='all'||d.sport===sp)];
  else all=all.filter(d=>true);
  if(cat!=='all') all=all.filter(d=>d.category===cat);
  if(dt!=='all') all=all.filter(d=>d.date===dt);
  if(res==='ok') all=all.filter(d=>d.correct===true);
  if(res==='ko') all=all.filter(d=>d.correct===false);

  document.getElementById('dt-count').textContent=`${all.length} match${all.length>1?'s':''}`;

  let html='<thead><tr><th>Date</th><th>Sport</th><th>Cat.</th><th>Ligue</th><th>Domicile</th><th>Extérieur</th><th>Préd.</th><th>P%</th><th>Cote</th><th>Score</th><th>OK?</th></tr></thead><tbody>';
  html+=all.slice(0,500).map(m=>{
    const c=sportColors[m.sport]||'#00d4aa';
    return `<tr><td>${m.date.slice(5)}</td><td><span class="badge-sport" style="background:${c}22;color:${c}">${m.sport}</span></td><td style="font-size:.7em;color:#8899aa">${m.category||'-'}</td><td style="color:#8899aa">${m.league_code||'-'}</td><td style="text-align:left;font-weight:600">${m.home_team}</td><td style="text-align:right;font-weight:600">${m.away_team}</td><td>${predB(m.prediction)}</td><td>${m.prob_a||'-'}</td><td>${m.odds_a||'-'}</td><td style="font-weight:700">${m.final_score||'-'}</td><td>${m.correct===true?badge(1):m.correct===false?badge(0):'<span style="color:#667788">-</span>'}</td></tr>`;
  }).join('');
  if(all.length>500) html+=`<tr><td colspan="11" style="color:#8899aa;padding:15px">... ${all.length-500} autres matchs non affichés</td></tr>`;
  html+='</tbody>';
  document.getElementById('dt-table').innerHTML=html;
}

renderOverview();initFBFilters();renderFBTable();initOSFilters();renderOSTable();initDetailFilters();renderDetails();
</script>
</body>
</html>
